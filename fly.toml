app = 'unprompted'
primary_region = 'ord'

[build]

[deploy]
  strategy = 'rolling'

[env]
  DB_PATH = '/data/conference_matcher.db'
  DATA_DIR = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = '10s'
  timeout = '3s'
  grace_period = '10s'
  method = 'GET'
  path = '/api/names'

[mounts]
  source = 'data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
