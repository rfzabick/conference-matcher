<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Graph - Conference Matcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Courier New", Courier, monospace;
    background: #fffff0;
    color: #333;
    overflow: hidden;
  }

  #topnav {
    background: #ddbb99;
    border-bottom: 2px solid #aa8866;
    padding: 12px 20px;
    display: flex;
    align-items: baseline;
    gap: 30px;
    position: relative;
    z-index: 10;
  }
  #topnav .site-name {
    font-family: "Courier New", Courier, monospace;
    font-size: 1.3em;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #topnav .site-name a {
    color: #333;
    text-decoration: none;
  }
  #topnav .nav-link {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.9rem;
    color: #554400;
    text-decoration: none;
  }
  #topnav .nav-link:hover { text-decoration: underline; }

  #graph-container {
    width: 100vw;
    height: calc(100vh - 50px);
    position: relative;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  #tooltip {
    position: absolute;
    pointer-events: none;
    background: #fffff0;
    border: 1px solid #aa8866;
    border-radius: 4px;
    padding: 8px 12px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.85rem;
    color: #554400;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
    display: none;
    z-index: 20;
    max-width: 200px;
  }

  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(255,255,240,0.92);
    border: 1px solid #cccc99;
    border-radius: 4px;
    padding: 12px 16px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.8rem;
    color: #554400;
    z-index: 10;
  }
  #legend h4 {
    margin-bottom: 6px;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
  }
  .legend-swatch {
    width: 30px;
    height: 6px;
    border-radius: 3px;
  }

  #loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,240,0.85);
    z-index: 30;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.1rem;
    color: #886644;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #cccc99;
    border-top-color: #aa8866;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Profile panel */
  #profile-panel {
    position: absolute;
    top: 0;
    right: 0;
    width: 380px;
    max-width: 90vw;
    height: 100%;
    background: #fffff0;
    border-left: 2px solid #cccc99;
    box-shadow: -4px 0 12px rgba(0,0,0,0.1);
    z-index: 25;
    overflow-y: auto;
    display: none;
    font-family: Arial, Helvetica, sans-serif;
  }
  #profile-panel.show { display: block; }
  #profile-close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #886644;
    line-height: 1;
    z-index: 1;
  }
  #profile-close:hover { color: #554400; }
  .profile-inner {
    padding: 20px;
  }
  .profile-photo {
    width: 100%;
    max-width: 200px;
    border-radius: 6px;
    border: 2px solid #cccc99;
    display: block;
    margin: 0 auto 16px;
  }
  .profile-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: #554400;
    margin-bottom: 12px;
    text-align: center;
  }
  .profile-name a {
    color: #1a6fb5;
    text-decoration: underline;
  }
  .profile-name a:hover { color: #0d4f8b; }
  .profile-section {
    margin: 10px 0;
    font-size: 0.88rem;
    color: #555;
    line-height: 1.5;
  }
  .profile-section-label {
    font-weight: 700;
    font-size: 0.78rem;
    color: #886644;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .profile-loading {
    text-align: center;
    padding: 40px;
    color: #888;
  }
</style>
</head>
<body>
<div id="topnav">
  <div class="site-name"><a href="https://punkgrok.org">punkgrok.org</a></div>
  <a href="/" class="nav-link">Back to Matcher</a>
</div>

<div id="graph-container">
  <div id="loading-overlay">Loading network graph<span class="spinner"></span></div>
  <svg id="graph-svg"></svg>
  <div id="tooltip"></div>
  <div id="profile-panel">
    <button id="profile-close">&times;</button>
    <div id="profile-content"></div>
  </div>
  <div id="legend">
    <h4>Connections</h4>
    <div class="legend-item">
      <div class="legend-swatch" style="background: linear-gradient(90deg, #d4a843, #d4a843); height: 8px;"></div>
      <span>Mutual match</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #aaa;"></div>
      <span>One-way match</span>
    </div>
    <div class="legend-item" style="margin-top: 6px; font-size: 0.75rem; color: #886644;">
      Tapers: thin = needs, wide = can help
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function() {
  const container = document.getElementById('graph-container');
  const svg = d3.select('#graph-svg');
  const tooltip = document.getElementById('tooltip');
  const loadingOverlay = document.getElementById('loading-overlay');
  const profilePanel = document.getElementById('profile-panel');
  const profileContent = document.getElementById('profile-content');

  // Read identity from cookie
  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
  }
  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  const identityName = getCookie('attendee_name');

  // Fetch graph data
  let data;
  try {
    const res = await fetch('/api/graph');
    data = await res.json();
  } catch (e) {
    loadingOverlay.textContent = 'Failed to load graph data.';
    return;
  }

  if (!data.nodes.length) {
    loadingOverlay.textContent = 'No attendees found.';
    return;
  }

  loadingOverlay.style.display = 'none';

  const width = container.clientWidth;
  const height = container.clientHeight;

  // Build node map for quick lookup
  const nodeMap = new Map(data.nodes.map(n => [n.id, n]));

  // Create force simulation
  // forceX/forceY pull all nodes toward center, preventing unconnected nodes
  // from drifting far out to the periphery
  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('x', d3.forceX(width / 2).strength(0.08))
    .force('y', d3.forceY(height / 2).strength(0.08))
    .force('collision', d3.forceCollide().radius(18));

  // Zoom behavior
  const g = svg.append('g');
  const zoom = d3.zoom()
    .scaleExtent([0.1, 5])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);

  // Arrowhead/taper definitions - we draw tapered shapes manually

  // Draw edges as tapered paths (polygon)
  const edgeGroup = g.append('g').attr('class', 'edges');

  function taperPoints(x1, y1, x2, y2, mutual) {
    // Narrow end at source (needs side), wide end at target (can-help side)
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len === 0) return '';

    // Perpendicular unit vector
    const px = -dy / len;
    const py = dx / len;

    const thinHalf = mutual ? 1.5 : 0.8;  // half-width at source (thin end)
    const wideHalf = mutual ? 5 : 3;       // half-width at target (wide end)

    // Four corners of the trapezoid
    const p1x = x1 + px * thinHalf;
    const p1y = y1 + py * thinHalf;
    const p2x = x1 - px * thinHalf;
    const p2y = y1 - py * thinHalf;
    const p3x = x2 - px * wideHalf;
    const p3y = y2 - py * wideHalf;
    const p4x = x2 + px * wideHalf;
    const p4y = y2 + py * wideHalf;

    return `${p1x},${p1y} ${p4x},${p4y} ${p3x},${p3y} ${p2x},${p2y}`;
  }

  const edgeElements = edgeGroup.selectAll('polygon')
    .data(data.edges)
    .join('polygon')
    .attr('fill', d => d.mutual ? '#d4a843' : '#bbb')
    .attr('opacity', d => d.mutual ? 0.7 : 0.35)
    .attr('stroke', 'none');

  // Draw nodes
  const nodeGroup = g.append('g').attr('class', 'nodes');

  let dragMoved = false;

  const nodeElements = nodeGroup.selectAll('g')
    .data(data.nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded)
    );

  // Find identity node ID
  const identityId = identityName
    ? (data.nodes.find(n => n.name.toLowerCase() === identityName.toLowerCase()) || {}).id
    : null;

  // Circle background for each node — bold border for current user
  nodeElements.append('circle')
    .attr('r', d => d.id === identityId ? 13 : 10)
    .attr('fill', '#ddbb99')
    .attr('stroke', d => d.id === identityId ? '#554400' : '#aa8866')
    .attr('stroke-width', d => d.id === identityId ? 3.5 : 1.5);

  // Clip path for thumbnail images
  const defs = svg.append('defs');
  data.nodes.forEach(n => {
    if (n.thumbnail_url) {
      const r = n.id === identityId ? 13 : 10;
      defs.append('clipPath')
        .attr('id', `clip-${n.id}`)
        .append('circle')
        .attr('r', r)
        .attr('cx', 0)
        .attr('cy', 0);
    }
  });

  // Add thumbnail images where available
  nodeElements.each(function(d) {
    if (d.thumbnail_url) {
      const r = d.id === identityId ? 13 : 10;
      d3.select(this).append('image')
        .attr('xlink:href', d.thumbnail_url)
        .attr('x', -r)
        .attr('y', -r)
        .attr('width', r * 2)
        .attr('height', r * 2)
        .attr('clip-path', `url(#clip-${d.id})`)
        .attr('preserveAspectRatio', 'xMidYMid slice');
    }
  });

  // Node interaction
  let selectedNode = null;

  // Build adjacency for highlight
  const adjacency = new Map();
  data.edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (!adjacency.has(sid)) adjacency.set(sid, new Set());
    if (!adjacency.has(tid)) adjacency.set(tid, new Set());
    adjacency.get(sid).add(tid);
    adjacency.get(tid).add(sid);
  });

  nodeElements
    .on('mouseover', function(event, d) {
      tooltip.style.display = 'block';
      tooltip.textContent = d.name;
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      tooltip.style.display = 'none';
    });

  // Click on background to deselect
  svg.on('click', function() {
    selectedNode = null;
    resetHighlight();
    closeProfile();
  });

  // Profile panel close button
  document.getElementById('profile-close').addEventListener('click', function(e) {
    e.stopPropagation();
    selectedNode = null;
    resetHighlight();
    closeProfile();
  });

  function closeProfile() {
    profilePanel.classList.remove('show');
  }

  async function openProfile(nodeId) {
    profilePanel.classList.add('show');
    profileContent.innerHTML = '<div class="profile-loading">Loading<span class="spinner"></span></div>';

    try {
      const res = await fetch(`/api/stars?ids=${nodeId}`);
      const attendees = await res.json();
      if (!attendees.length) {
        profileContent.innerHTML = '<div class="profile-loading">Profile not found.</div>';
        return;
      }
      const a = attendees[0];

      let html = '<div class="profile-inner">';

      if (a.thumbnail_url) {
        html += `<img class="profile-photo" src="${esc(a.thumbnail_url)}" alt="${esc(a.name)}">`;
      }

      const nameText = esc(a.name);
      const nameHtml = a.linkedin_url
        ? `<a href="${esc(a.linkedin_url)}" target="_blank" rel="noopener">${nameText}</a>`
        : nameText;
      html += `<div class="profile-name">${nameHtml}</div>`;

      if (a.stuff_i_do) {
        html += `<div class="profile-section"><div class="profile-section-label">Stuff I do</div>${esc(a.stuff_i_do)}</div>`;
      }
      if (a.stuff_i_can_share) {
        html += `<div class="profile-section"><div class="profile-section-label">Can share / help with</div>${esc(a.stuff_i_can_share)}</div>`;
      }
      if (a.stuff_i_need) {
        html += `<div class="profile-section"><div class="profile-section-label">Needs</div>${esc(a.stuff_i_need)}</div>`;
      }

      html += '</div>';
      profileContent.innerHTML = html;
    } catch (e) {
      profileContent.innerHTML = '<div class="profile-loading">Failed to load profile.</div>';
    }
  }

  function highlightNode(nodeId) {
    const neighbors = adjacency.get(nodeId) || new Set();

    nodeElements.select('circle')
      .attr('opacity', d => (d.id === nodeId || neighbors.has(d.id)) ? 1 : 0.12);
    nodeElements.selectAll('image')
      .attr('opacity', d => (d.id === nodeId || neighbors.has(d.id)) ? 1 : 0.12);

    // Highlight selected node, preserve identity bold border
    nodeElements.select('circle')
      .attr('stroke-width', d => d.id === nodeId ? 3.5 : (d.id === identityId ? 3.5 : 1.5))
      .attr('stroke', d => (d.id === nodeId || d.id === identityId) ? '#554400' : '#aa8866');

    edgeElements
      .attr('opacity', d => {
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return (sid === nodeId || tid === nodeId) ? (d.mutual ? 0.85 : 0.5) : 0.04;
      });
  }

  function resetHighlight() {
    nodeElements.select('circle')
      .attr('opacity', 1)
      .attr('stroke-width', d => d.id === identityId ? 3.5 : 1.5)
      .attr('stroke', d => d.id === identityId ? '#554400' : '#aa8866');
    nodeElements.selectAll('image')
      .attr('opacity', 1);
    edgeElements
      .attr('opacity', d => d.mutual ? 0.7 : 0.35);
  }

  // Simulation tick
  simulation.on('tick', () => {
    edgeElements.attr('points', d => {
      return taperPoints(d.source.x, d.source.y, d.target.x, d.target.y, d.mutual);
    });

    nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Drag handlers — also detect clicks (D3 drag suppresses click events)
  function dragStarted(event, d) {
    dragMoved = false;
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    dragMoved = true;
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragEnded(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;

    // If pointer didn't move, treat as a click
    if (!dragMoved) {
      if (selectedNode === d.id) {
        selectedNode = null;
        resetHighlight();
        closeProfile();
      } else {
        selectedNode = d.id;
        highlightNode(d.id);
        openProfile(d.id);
      }
    }
  }
})();
</script>
</body>
</html>
